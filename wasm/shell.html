<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>POM2 — Apple II Emulator (WASM)</title>
<style>
  html, body { margin: 0; padding: 0; background: #181820; color: #ddd;
               font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
               overflow: hidden; height: 100%; }
  #status   { position: fixed; top: 8px; left: 8px; right: 8px;
              font-size: 13px; line-height: 1.4; pointer-events: none;
              text-shadow: 0 0 4px rgba(0,0,0,0.9); z-index: 10; }
  #status.hidden { display: none; }
  #progress { display: inline-block; width: 220px; height: 6px;
              background: #2a2a36; border-radius: 3px; overflow: hidden;
              vertical-align: middle; margin-left: 6px; }
  #progress > div { background: #5aa8ff; height: 100%; width: 0%;
                    transition: width 0.1s linear; }
  canvas    { display: block; width: 100vw; height: 100vh;
              background: #000; cursor: default; outline: none; }
  #err      { position: fixed; left: 16px; right: 16px; top: 16px;
              padding: 12px 16px; background: #4a1a1a; color: #ffe;
              border-radius: 6px; font-family: ui-monospace, monospace;
              font-size: 12px; white-space: pre-wrap; display: none;
              z-index: 20; }
  .pill     { display: inline-block; padding: 2px 8px; border-radius: 9px;
              background: #2a2a36; font-size: 11px; margin-right: 6px; }
</style>
</head>
<body>
<div id="status">
  <span class="pill">POM2 WASM</span>
  <span id="statusMsg">Downloading…</span>
  <span id="progress"><div></div></span>
</div>
<div id="err"></div>
<canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
<script>
  // Single-threaded WASM by design — no SharedArrayBuffer / COOP/COEP
  // dependency, so the page boots on any static host (GitHub Pages,
  // Cloudflare Pages, plain S3, …) with no header tweaking.

  const statusEl   = document.getElementById('statusMsg');
  const progressEl = document.querySelector('#progress > div');
  const errEl      = document.getElementById('err');
  function setStatus(msg) { if (statusEl) statusEl.textContent = msg; }
  function setProgress(num, total) {
    if (!progressEl || !total) return;
    progressEl.style.width = Math.min(100, (100 * num / total)) + '%';
  }

  // Default WASM experience: //c profile auto-booting Total Replay from
  // the bundled floppyemu/. Both knobs are URL-overridable so a deeplink
  // can pick a different profile or disk without rebuilding:
  //   ?preset=iie&disk=floppyemu/A2DeskTop-1.5-en_800k.2mg
  //   ?preset=ii+        (no auto-boot — drops to the BASIC prompt)
  //   ?nodisk=1          (keep the preset, skip the disk arg)
  const _qs = new URLSearchParams(window.location.search);
  const _preset = _qs.get('preset') || 'iic';
  const _disk   = _qs.get('nodisk') === '1' ? null
                 : (_qs.get('disk') || 'floppyemu/Total Replay v5.2.hdv');
  const _args = ['--preset', _preset];
  if (_disk) _args.push(_disk);

  var Module = {
    arguments: _args,
    canvas: (function() {
      const c = document.getElementById('canvas');
      // ContextLost recovery is the user's problem (refresh tab).
      c.addEventListener('webglcontextlost', e => {
        errEl.style.display = 'block';
        errEl.textContent = 'WebGL context lost. Reload the page.';
        e.preventDefault();
      }, false);
      return c;
    })(),
    print:   (text) => { console.log(text); },
    printErr:(text) => { console.warn(text); },
    setStatus: (text) => {
      // Emscripten posts "Downloading data... (n/total)" — parse it.
      if (!text) { document.getElementById('status').classList.add('hidden'); return; }
      const m = text.match(/\((\d+)\/(\d+)\)/);
      if (m) {
        setProgress(parseInt(m[1]), parseInt(m[2]));
        setStatus("Downloading assets… " + m[1] + " / " + m[2]);
      } else {
        setStatus(text);
      }
    },
    monitorRunDependencies: function(left) {
      if (left === 0) {
        // All async deps resolved. Hide the banner shortly after the
        // first frame runs.
        setTimeout(() => {
          document.getElementById('status').classList.add('hidden');
        }, 400);
      }
    },
    onAbort: function(reason) {
      errEl.style.display = 'block';
      errEl.textContent = "POM2 aborted: " + reason;
    },
  };
  // Persistent settings: mount IndexedDB at /persistent so a future
  // ResourcePaths/Settings tweak can write state.cfg / imgui.ini there.
  // Not consumed yet — left in so the FS hierarchy is ready.
  Module.preRun = (Module.preRun || []);
  Module.preRun.push(function() {
    try {
      FS.mkdir('/persistent');
      FS.mount(IDBFS, {}, '/persistent');
      FS.syncfs(true, function (err) {
        if (err) console.warn('IDBFS load:', err);
      });
    } catch (e) { console.warn('IDBFS mount failed:', e); }
  });
</script>
{{{ SCRIPT }}}
</body>
</html>
